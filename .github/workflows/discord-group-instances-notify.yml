name: Discord Group Instances Notify

on:
  schedule:
    # 毎週日曜 15:45 JST (= 06:45 UTC)
    - cron: '45 6 * * 0'
  workflow_dispatch:
    inputs:
      group_id:
        description: '上書きする VRChat Group ID (例: grp_xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)。空なら secret VRCHAT_GROUP_ID を使用'
        required: false
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npx vitest run

      - name: Send Discord notification
        run: npx tsx scripts/discord-group-instances-notify.ts
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VRCHAT_USER_ID: ${{ secrets.VRCHAT_USER_ID }}
          # schedule 実行時は inputs が未定義のため secret にフォールバック
          VRCHAT_GROUP_ID: ${{ inputs.group_id || secrets.VRCHAT_GROUP_ID }}
          VRCHAT_AUTH_COOKIE: ${{ secrets.VRCHAT_AUTH_COOKIE }}
          # 任意。auth Cookie 単独だと Cookie 取得元と runner の IP が離れる環境で
          # 401 "Missing Credentials" が返るため、twoFactorAuth JWT (30 日失効) を
          # 付与することで IP が変わっても認証が通る (src/lib/fetchGroupInstances.ts 参照)
          VRCHAT_TWOFA_COOKIE: ${{ secrets.VRCHAT_TWOFA_COOKIE }}
